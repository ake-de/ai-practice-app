<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Java Roadmap Buddy</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .prose h3 { color: #1e40af; margin-top: 1.5rem; font-weight: bold; border-left: 4px solid #3b82f6; padding-left: 0.5rem; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose hr { margin: 2rem 0; border-color: #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">🚀 AI 학습 로드맵 가이드</h1>
            <p class="text-slate-500">원하는 주제를 입력하면 Gemini 3가 최적의 커리큘럼을 짜드립니다.</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 flex flex-col gap-3">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="topic" placeholder="예: Java, Spring Boot..." 
                       class="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <input type="password" id="passcode" placeholder="비밀번호" 
                       class="w-full md:w-32 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="generate()" id="btn"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md">
                    로드맵 생성
                </button>
            </div>
        </div>
        
        <div id="history-section" class="mb-8 hidden">
            <h3 class="text-sm font-bold text-slate-500 mb-3 ml-1">📚 최근 생성 기록</h3>
            <div id="history-list" class="flex flex-wrap gap-2">
                </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-2 text-slate-600">AI 멘토가 커리큘럼을 작성 중입니다...</p>
        </div>

        <div id="result-card" class="hidden bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
            <div id="result" class="prose max-w-none text-slate-700 leading-relaxed">
                </div>
        </div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            const passcode = document.getElementById('passcode').value; // 비밀번호 가져오기
            
            if(!topic) return alert("주제를 입력해주세요!");
            if(!passcode) return alert("비밀번호를 입력해주세요!"); // 비밀번호 빈칸 방지
            
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const resultCard = document.getElementById('result-card');
            const resultDiv = document.getElementById('result');

            // UI 초기화
            btn.disabled = true;
            loading.classList.remove('hidden');
            resultCard.classList.add('hidden');

            try {
                // 변경된 부분: URL 뒤에 ?topic=...&passcode=... 가 완전히 사라졌습니다!
                const response = await fetch('/api/roadmap', {
                    method: 'POST', // "나 지금 엽서 말고 소포(POST) 보낸다!" 선언
                    headers: {
                        'Content-Type': 'application/json' // "이 소포 안에는 JSON 형식의 데이터가 들어있어"
                    },
                    body: JSON.stringify({ // 데이터를 금고(Body) 안에 넣고 잠급니다(stringify).
                        topic: topic,
                        passcode: passcode
                    })
                });
                
                const data = await response.json();

                // 마크다운을 HTML로 변환하여 삽입
                resultDiv.innerHTML = marked.parse(data.content);
                resultCard.classList.remove('hidden');
            } catch (error) {
                alert("로드맵 생성 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
                loadHistory(); // <--- 새로 생성 후 히스토리 목록 업데이트!
            }
        }

        // 1. 페이지가 켜지면 제일 먼저 히스토리를 불러옵니다!
        window.onload = loadHistory;

        // 2. 백엔드에서 과거 기록을 가져오는 함수
        async function loadHistory() {
            try {
                // GET 방식으로 /api/roadmap 호출
                const response = await fetch('/api/roadmap'); 
                const roadmaps = await response.json();
                
                const historySection = document.getElementById('history-section');
                const historyList = document.getElementById('history-list');
                
                // 데이터가 1개라도 있으면 영역을 보여줍니다.
                if (roadmaps.length > 0) {
                    historySection.classList.remove('hidden');
                    historyList.innerHTML = ''; // 기존 목록 비우기
                    
                    // 과거 기록을 버튼으로 쫙 만들어줍니다.
                    roadmaps.forEach(roadmap => {
                        const btn = document.createElement('button');
                        btn.className = 'bg-white border border-slate-200 hover:border-blue-500 hover:text-blue-600 text-slate-600 px-4 py-2 rounded-full text-sm transition-all shadow-sm';
                        btn.innerText = roadmap.topic;
                        
                        // 버튼을 누르면 AI 통신 없이 즉시 화면에 렌더링!
                        btn.onclick = () => showSavedRoadmap(roadmap.topic, roadmap.content);
                        historyList.appendChild(btn);
                    });
                }
            } catch (error) {
                console.error("히스토리 로딩 실패:", error);
            }
        }

        // 3. 저장된 로드맵을 화면에 즉시 띄우는 함수
        function showSavedRoadmap(topic, content) {
            document.getElementById('topic').value = topic;
            document.getElementById('result').innerHTML = marked.parse(content);
            document.getElementById('result-card').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('result-card').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
